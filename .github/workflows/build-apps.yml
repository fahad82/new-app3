name: Generate Free Android APK and iOS IPA
on:
  workflow_dispatch:

jobs:
  compile-binaries:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Build Android APK with EAS
        run: eas build --platform android --profile production --non-interactive
        env:
          EAS_BUILD_PROFILE: production

      - name: Build iOS IPA with EAS
        run: eas build --platform ios --profile production --non-interactive
        env:
          EAS_BUILD_PROFILE: production

      - name: Download Android APK
        run: |
          mkdir -p artifacts
          # APK will be available in EAS builds

      - name: Download iOS IPA
        run: |
          mkdir -p artifacts
          # IPA will be available in EAS builds
